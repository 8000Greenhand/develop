<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="192" height="192" rx="24" fill="url(#bgGrad)"/>
  
  <!-- 龙形剪影 -->
  <g transform="translate(96, 80)" filter="url(#glow)">
    <!-- 龙身 -->
    <path d="M0 -50 
             C20 -50 35 -35 40 -20
             C50 -25 60 -20 55 -5
             C65 0 70 15 60 25
             C55 35 45 40 35 35
             C25 45 10 50 0 45
             C-10 50 -25 45 -35 35
             C-45 40 -55 35 -60 25
             C-70 15 -65 0 -55 -5
             C-60 -20 -50 -25 -40 -20
             C-35 -35 -20 -50 0 -50 Z" 
          fill="url(#goldGrad)" opacity="0.9"/>
    
    <!-- 龙眼 -->
    <circle cx="-25" cy="-25" r="6" fill="#8b0000"/>
    <circle cx="25" cy="-25" r="6" fill="#8b0000"/>
    
    <!-- 骰子图标 -->
    <g transform="translate(0, 65)">
      <rect x="-20" y="-20" width="40" height="40" rx="6" 
            fill="#16213e" stroke="url(#goldGrad)" stroke-width="3"/>
      <circle cx="0" cy="0" r="6" fill="url(#goldGrad)"/>
      <circle cx="-12" cy="-12" r="3" fill="url(#goldGrad)"/>
      <circle cx="12" cy="-12" r="3" fill="url(#goldGrad)"/>
      <circle cx="-12" cy="12" r="3" fill="url(#goldGrad)"/>
      <circle cx="12" cy="12" r="3" fill="url(#goldGrad)"/>
    </g>
  </g>
  
  <!-- 装饰符文 -->
  <g opacity="0.3" stroke="url(#goldGrad)" stroke-width="1" fill="none">
    <path d="M20 30 L30 20 L40 30"/>
    <path d="M152 30 L162 20 L172 30"/>
    <path d="M20 162 L30 172 L40 162"/>
    <path d="M152 162 L162 172 L172 162"/>
  </g>
</svg>
